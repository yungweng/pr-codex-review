name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n bin/pr-codex-review
      - name: Shellcheck
        run: shellcheck bin/pr-codex-review
      - name: Help renders
        run: bash bin/pr-codex-review --help
      - name: Version flag
        run: bash bin/pr-codex-review --version
